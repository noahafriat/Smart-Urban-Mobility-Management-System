# Test configuration - overrides main application.properties for tests

# Disable real mail sending in tests
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=test@test.com

# STM keys not needed in tests
stm.api.key=
stm.api.shared-secret=
stm.trip-updates.url=https://api.stm.info/pub/od/gtfs-rt/ic/v2/tripUpdates

# Point to the test GTFS files
stm.gtfs.stops-resource=classpath:gtfs-test/stm_stops.txt
stm.gtfs.trips-resource=classpath:gtfs-test/stm_trips.txt
stm.gtfs.shapes-resource=classpath:gtfs-test/stm_shapes.txt
