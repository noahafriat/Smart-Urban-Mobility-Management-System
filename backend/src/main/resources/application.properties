spring.application.name=SUMMS Backend
server.port=8080

# STM iBUS GTFS-Realtime (optional). Get a key at https://portail.developpeurs.stm.info/apihub/
# Prefer backend/.env or env vars STM_API_KEY / STM_SHARED_SECRET (see backend/.env.example).
# If the API responds HTTP 400, read the error text (often "Invalid API Key"): publish the app in the portal, confirm the GTFS-RT product is subscribed, and regenerate the key if needed.
stm.api.key=${STM_API_KEY:}
stm.api.shared-secret=${STM_SHARED_SECRET:}
# Copy the trip-updates URL from the STM developer portal (Specs → Try it out) if this default fails.
stm.trip-updates.url=https://api.stm.info/pub/od/gtfs-rt/ic/v2/tripUpdates

# Static GTFS (from https://stm.info/sites/default/files/gtfs/gtfs_stm.zip) — stop names + direction labels.
stm.gtfs.stops-resource=classpath:gtfs/stm_stops.txt
stm.gtfs.trips-resource=classpath:gtfs/stm_trips.txt
stm.gtfs.shapes-resource=classpath:gtfs/stm_shapes.txt
